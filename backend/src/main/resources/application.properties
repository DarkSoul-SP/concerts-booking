spring.application.name=concerts-booking

server.port=8080
server.servlet.session.cookie.same-site=lax

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/concerts}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:concerts}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:concerts}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=INFO
