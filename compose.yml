services:
  db:
    image: 'postgres:16.14-alpine3.23'
    container_name: 'concerts-booking-db'
    environment:
      POSTGRES_DB: 'concerts'
      POSTGRES_USER: 'concerts'
      POSTGRES_PASSWORD: 'concerts'
    ports:
      - '5432:5432'
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concerts -d concerts"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: 'concerts-booking-backend'
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: 'jdbc:postgresql://db:5432/concerts'
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: 'org.postgresql.Driver'
      SPRING_DATASOURCE_USERNAME: 'concerts'
      SPRING_DATASOURCE_PASSWORD: 'concerts'
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
    container_name: 'concerts-booking-frontend'
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres-data:
